[[boxy_tools]]
name = "wechat.send_message"
description = "Dispatch a single-line WeChat plain-text message (max 4096 chars). Requires idempotency_key for safe deduplication/replay; `status=sent` is dispatch-only (not delivery-confirmed), and `unknown_delivery` requires retry with a new idempotency key."
side_effect = true

[boxy_tools.input_schema]
type = "object"
required = [
    "target",
    "message_content",
    "idempotency_key",
]

[boxy_tools.input_schema.properties.display_id]
type = "integer"
description = "Optional display id. Defaults to the connector display (typically 99)."

[boxy_tools.input_schema.properties.target]
type = "string"
description = "Non-empty WeChat target username (for example `wxid_alice`)."

[boxy_tools.input_schema.properties.message_content]
type = "string"
description = "Single-line plain-text message content (no `\\n` or `\\r`)."
maxLength = 4096

[boxy_tools.input_schema.properties.allow_cua_fallback]
type = "boolean"
description = "Accepted for compatibility but ignored in this MVP."

[boxy_tools.input_schema.properties.idempotency_key]
type = "string"
description = "Non-empty idempotency key for deduplication and safe replay."

[boxy_tools.output_schema]
type = "object"
required = [
    "status",
    "target_resolved",
    "message_ref",
    "sent_at",
    "details",
]

[boxy_tools.output_schema.properties.status]
type = "string"
enum = [
    "sent",
    "failed",
    "unknown_delivery",
]
description = "`sent` means send was dispatched (not delivery-confirmed); `failed` is deterministic pre-dispatch failure; `unknown_delivery` means dispatch outcome is uncertain."

[boxy_tools.output_schema.properties.target_resolved]
type = "string"
description = "Resolved target username used for the send attempt."

[boxy_tools.output_schema.properties.message_ref]
type = [
    "string",
    "null",
]

[boxy_tools.output_schema.properties.sent_at]
type = [
    "string",
    "null",
]

[boxy_tools.output_schema.properties.details]
type = "object"
description = "Additional diagnostics; for `unknown_delivery`, `requires_new_idempotency_key_for_retry=true` indicates retries must use a new idempotency key."

