schema_version = 1

data_queries = []
boxy_tools = []

[[builtin_tools]]
name = "web_search"
description = "Search the public web for internet information. Do not use for private connector or locally ingested user data."
input_schema = { type = "object", properties = { query = { type = "string" } }, required = ["query"] }
output_schema = { type = "object", properties = { results = { type = "array", items = { type = "object" } } } }

[[builtin_tools]]
name = "python_exec"
description = "Execute simple local Python computations in a constrained environment. No network access and no general stdlib/runtime access; use it for small local calculations and transformations only."
input_schema = { type = "object", properties = { code = { type = "string" } }, required = ["code"] }
output_schema = { type = "object", properties = { result = {}, stdout = { type = "string" }, stderr = { type = "string" } } }
