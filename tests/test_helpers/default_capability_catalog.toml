schema_version = 1

[[data_queries]]
name = "gmail.messages"
description = "Read a user's email messages."
query_capabilities = { operators = ["fts", "time_range", "limit"] }
input_schema = { type = "object", additionalProperties = false, properties = { fts = { type = "string" }, limit = { type = "integer", minimum = 1, maximum = 50 }, time_range = { type = "object", additionalProperties = false, required = ["start", "end"], properties = { start = { type = "string", format = "date-time" }, end = { type = "string", format = "date-time" } } } } }
output_schema = { type = "array", items = { type = "object", additionalProperties = false, required = ["id", "subject"], properties = { id = { type = "string" }, subject = { type = "string" } } } }

[[boxy_tools]]
name = "gmail.send_message"
description = "Send an email message."
input_schema = { type = "object", additionalProperties = false, required = ["to", "subject", "body"], properties = { to = { type = "array", minItems = 1, items = { type = "string" } }, subject = { type = "string" }, body = { type = "string" } } }
output_schema = { type = "object", additionalProperties = false, required = ["status", "message_id"], properties = { status = { type = "string", enum = ["sent", "queued"] }, message_id = { type = "string" } } }

[[builtin_tools]]
name = "web_search"
description = "Search the web."
input_schema = { type = "object", additionalProperties = false, required = ["query"], properties = { query = { type = "string" } } }
output_schema = { type = "object", additionalProperties = false, required = ["items"], properties = { items = { type = "array", items = { type = "object" } } } }
